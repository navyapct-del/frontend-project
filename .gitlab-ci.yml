stages:
  - build
  - deploy

build:
  stage: build
  image: node:18
  script:
    - echo "VITE_AZURE_API_URL=$VITE_AZURE_API_URL" > .env
    - echo "VITE_APIM_SUBSCRIPTION_KEY=$VITE_APIM_SUBSCRIPTION_KEY" >> .env
    - rm -rf dist node_modules/.vite
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/

deploy:
  stage: deploy
  image: node:18
  script:
    - npm install -g @azure/static-web-apps-cli
    - swa deploy ./dist --deployment-token $SWA_DEMO_TOKEN --env production
  only:
    - main
